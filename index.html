<!DOCTYPE html>
<html>
<head>
<title>Glass Calculator</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#001c26">
</head>

<body>

<div class="circle1"></div>
<div class="circle2"></div>

<div class="calculator">

<input type="text" id="display" readonly>

<div class="buttons">

<button onclick="clearDisplay()">C</button>
<button onclick="deleteLast()">DEL</button>
<button onclick="append('/')">/</button>
<button onclick="append('*')">*</button>

<button onclick="append('-')">-</button>
<button onclick="append('%')">%</button>
<button onclick="append('^')">^</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('+')">+</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>

<button onclick="append('0')">0</button>
<button onclick="append('00')">00</button>
<button onclick="append('.')">.</button>
<button onclick="calculate()">=</button>

</div>

</div>

<script src="script.js"></script>
<script>

const card = document.querySelector(".calculator");

document.addEventListener("mousemove", (e) => {

    const x = (window.innerWidth / 2 - e.clientX) / 25;
    const y = (window.innerHeight / 2 - e.clientY) / 25;

    card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

document.addEventListener("mouseleave", () => {
    card.style.transform = "rotateY(0deg) rotateX(0deg)";
});

</script>
<script>

document.addEventListener("touchmove", (e) => {

    const touch = e.touches[0];

    const x = (window.innerWidth / 2 - touch.clientX) / 25;
    const y = (window.innerHeight / 2 - touch.clientY) / 25;

    card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;

});

</script>
</body>
</html>
